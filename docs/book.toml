[book]
title = "Portless"
description = "Rust-native local development platform that replaces port numbers with stable HTTPS hostnames."
authors = ["Muhammad Fiaz <contact@muhammadfiaz.com>"]
language = "en"
src = "src"

[output.html]
default-theme = "rust"
git-repository-url = "https://github.com/muhammad-fiaz/portless"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/muhammad-fiaz/portless/edit/main/docs/{path}"
site-url = "https://muhammad-fiaz.github.io/portless/"
additional-css = ["theme/custom.css"]
additional-js = ["theme/analytics.js", "theme/adsense.js"]

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = true

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[preprocessor.mermaid]
command = "mdbook-mermaid"
renderer = ["html"]
